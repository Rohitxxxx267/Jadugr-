<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Force-Win — Live AI</title>

<style>
body{background:#071022;color:#fff;font-family:Arial;padding:18px}
.card{background:#0b1b2c;padding:12px;border-radius:10px;margin-top:10px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.box{flex:1;min-width:120px;background:#061423;padding:10px;border-radius:8px;text-align:center}
.highlight{color:#ffd60a;font-size:22px;font-weight:bold}
table{width:100%;margin-top:15px;border-collapse:collapse}
td,th{border:1px solid #233;padding:6px;text-align:center;font-size:13px}
.win{color:#7ef1a3}
.loss{color:#ff7a7a}
</style>
</head>

<body>

<h2>🚀 Force-Win AI System (Live)</h2>

<div class="card">
  <div>Current Prediction</div>
  <div class="highlight" id="main">--</div>

  <div class="row">
    <div class="box">
      Primary <div id="primary">--</div>
    </div>
    <div class="box">
      Backup <div id="backup">--</div>
    </div>
    <div class="box">
      Tertiary <div id="tertiary">--</div>
    </div>
  </div>
</div>

<div class="card">
  <b>Live History</b>
  <table>
    <thead>
      <tr>
        <th>Period</th>
        <th>Primary</th>
        <th>Backup</th>
        <th>Ter</th>
        <th>Actual</th>
        <th>Result</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="log"></tbody>
  </table>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// connection test
socket.on("connect",()=>{
  console.log("CONNECTED TO BACKEND ✅");
});

// MAIN UPDATE FROM BACKEND
socket.on("update",(data)=>{

  document.getElementById("main").innerText = data.active || "--";
  document.getElementById("primary").innerText = data.primary || "--";
  document.getElementById("backup").innerText = data.backup || "--";
  document.getElementById("tertiary").innerText = data.tertiary || "--";

  let log = document.getElementById("log");
  log.innerHTML = "";

  if(data.logs && data.logs.length){

    data.logs.slice().reverse().forEach(l=>{
      let row = document.createElement("tr");

      row.innerHTML = `
        <td>${l.period}</td>
        <td>${l.primary}</td>
        <td>${l.backup}</td>
        <td>${l.tertiary}</td>
        <td>${l.actual}</td>
        <td class="${l.result==='Win'?'win':'loss'}">${l.result}</td>
        <td>${l.time}</td>
      `;

      log.appendChild(row);
    });
  }
});
</script>

</body>
</html>
