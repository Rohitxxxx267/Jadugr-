<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Force-Win Live AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071022;
  color:#fff;
  padding:20px;
}

h2{color:#ffd60a}

.card{
  background:#0b1b2c;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  border:1px solid #234;
}

.row{display:flex;gap:10px;flex-wrap:wrap}

.box{
  flex:1;
  min-width:120px;
  padding:10px;
  border-radius:8px;
  background:#061423;
  text-align:center;
}

.big{color:#7ef1a3;font-weight:bold}
.small{color:#ff7a7a;font-weight:bold}
.highlight{color:#ffd60a;font-size:20px;font-weight:bold}

table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}

td,th{
  border:1px solid #233;
  padding:6px;
  text-align:center;
  font-size:13px;
}
</style>
</head>

<body>

<h2>🚀 Force-Win Live AI System</h2>

<div class="card">
  <div>Current Prediction</div>
  <div class="highlight" id="main">--</div>

  <div class="row">
    <div class="box">Primary <div id="primary"></div></div>
    <div class="box">Backup <div id="backup"></div></div>
    <div class="box">Tertiary <div id="tertiary"></div></div>
  </div>
</div>

<div class="card">
  <b>Live History</b>
  <table>
    <thead>
      <tr>
        <th>Period</th>
        <th>Primary</th>
        <th>Backup</th>
        <th>Actual</th>
        <th>Result</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="log"></tbody>
  </table>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const main = document.getElementById("main");
const primary = document.getElementById("primary");
const backup = document.getElementById("backup");
const tertiary = document.getElementById("tertiary");
const log = document.getElementById("log");

socket.on("update",(data)=>{

  main.innerText = data.active || "--";
  primary.innerText = data.primary || "--";
  backup.innerText = data.backup || "--";
  tertiary.innerText = data.tertiary || "--";

  if(data.logs){
    log.innerHTML = "";

    data.logs.slice().reverse().forEach(l=>{
      let row = document.createElement("tr");
      row.innerHTML = `
        <td>${l.period}</td>
        <td>${l.primary}</td>
        <td>${l.backup}</td>
        <td>${l.actual}</td>
        <td>${l.result}</td>
        <td>${l.time}</td>
      `;
      log.appendChild(row);
    });
  }
});
</script>

</body>
</html>
